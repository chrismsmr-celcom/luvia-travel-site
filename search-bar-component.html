    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .search-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
        }
        
        .tab-active {
            background: white;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            position: relative;
            z-index: 10;
        }
        
        .tab-inactive {
            background: transparent;
            color: #6b7280;
        }
        
        .divider-vertical {
            border-right: 1px solid #e5e7eb;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        input:focus, select:focus {
            outline: none;
            ring: none;
        }
        
        .badge-new {
            position: absolute;
            top: -8px;
            right: -20px;
            background: #ef4444;
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        
        /* Styles pour l'autocomplétion */
        .autocomplete-results {
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        }
        
        .autocomplete-item {
            transition: background-color 0.2s ease;
            cursor: pointer;
        }
        
        .autocomplete-item:hover {
            background-color: #f3f4f6;
        }
        
        .autocomplete-item.selected {
            background-color: #eff6ff;
        }
        
        .relative {
            position: relative;
        }
        
        @media (max-width: 768px) {
            .divider-vertical {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }
        }
    </style>
</head>

    <script>
        // ==================== AUTOCOMPLETION ====================
        class CityAutocomplete {
            constructor(inputElement, options = {}) {
                this.input = inputElement;
                this.options = {
                    minChars: 2,
                    delay: 300,
                    maxResults: 10,
                    ...options
                };
                
                this.currentRequest = null;
                this.resultsContainer = null;
                this.selectedIndex = -1;
                
                this.init();
            }
            
            init() {
                // Créer le conteneur des résultats
                this.resultsContainer = document.createElement('div');
                this.resultsContainer.className = 'autocomplete-results absolute z-50 w-full bg-white border border-gray-200 rounded-lg shadow-lg mt-1 hidden';
                
                // S'assurer que le parent a position relative
                if (getComputedStyle(this.input.parentElement).position !== 'relative') {
                    this.input.parentElement.style.position = 'relative';
                }
                this.input.parentElement.appendChild(this.resultsContainer);
                
                // Événements
                this.input.addEventListener('input', (e) => this.onInput(e));
                this.input.addEventListener('keydown', (e) => this.onKeyDown(e));
                this.input.addEventListener('blur', (e) => this.onBlur(e));
            }
            
            onInput(event) {
                const query = event.target.value.trim();
                
                if (query.length < this.options.minChars) {
                    this.hideResults();
                    return;
                }
                
                clearTimeout(this.debounceTimeout);
                this.debounceTimeout = setTimeout(() => this.search(query), this.options.delay);
            }
            
            async search(query) {
                if (this.currentRequest) {
                    this.currentRequest.abort();
                }
                
                this.currentRequest = new AbortController();
                
                try {
                    const response = await fetch(`includes/config.php?action=autocomplete&query=${encodeURIComponent(query)}`, {
                        signal: this.currentRequest.signal
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        this.displayResults(data.results);
                    }
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        console.error('Autocomplete error:', error);
                    }
                } finally {
                    this.currentRequest = null;
                }
            }
            
            displayResults(results) {
                if (results.length === 0) {
                    this.hideResults();
                    return;
                }
                
                this.resultsContainer.innerHTML = '';
                this.selectedIndex = -1;
                
                results.forEach((result, index) => {
                    const item = document.createElement('div');
                    item.className = 'autocomplete-item p-3 hover:bg-gray-100 border-b border-gray-100 last:border-0';
                    item.innerHTML = result.display;
                    item.setAttribute('data-value', result.value);
                    item.setAttribute('data-city', result.city);
                    item.setAttribute('data-country', result.country || '');
                    item.setAttribute('data-type', result.type);
                    
                    item.addEventListener('click', () => {
                        this.selectResult(result);
                    });
                    
                    item.addEventListener('mouseenter', () => {
                        this.selectedIndex = index;
                        this.highlightSelected();
                    });
                    
                    this.resultsContainer.appendChild(item);
                });
                
                this.resultsContainer.classList.remove('hidden');
                this.resultsContainer.style.display = 'block';
            }
            
            highlightSelected() {
                const items = this.resultsContainer.querySelectorAll('.autocomplete-item');
                items.forEach((item, index) => {
                    if (index === this.selectedIndex) {
                        item.classList.add('bg-blue-50');
                    } else {
                        item.classList.remove('bg-blue-50');
                    }
                });
            }
            
            selectResult(result) {
                this.input.value = result.value;
                this.hideResults();
                
                // Stocker les données supplémentaires
                this.input.dataset.city = result.city;
                this.input.dataset.country = result.country || '';
                this.input.dataset.type = result.type;
                
                const event = new Event('change', { bubbles: true });
                this.input.dispatchEvent(event);
            }
            
            onKeyDown(event) {
                const items = this.resultsContainer.querySelectorAll('.autocomplete-item');
                
                if (items.length === 0) return;
                
                switch (event.key) {
                    case 'ArrowDown':
                        event.preventDefault();
                        this.selectedIndex = Math.min(this.selectedIndex + 1, items.length - 1);
                        this.highlightSelected();
                        break;
                        
                    case 'ArrowUp':
                        event.preventDefault();
                        this.selectedIndex = Math.max(this.selectedIndex - 1, -1);
                        this.highlightSelected();
                        break;
                        
                    case 'Enter':
                        event.preventDefault();
                        if (this.selectedIndex >= 0 && items[this.selectedIndex]) {
                            const value = items[this.selectedIndex].getAttribute('data-value');
                            const result = {
                                value: value,
                                city: items[this.selectedIndex].getAttribute('data-city'),
                                country: items[this.selectedIndex].getAttribute('data-country'),
                                type: items[this.selectedIndex].getAttribute('data-type')
                            };
                            this.selectResult(result);
                        }
                        break;
                        
                    case 'Escape':
                        this.hideResults();
                        break;
                }
            }
            
            onBlur(event) {
                setTimeout(() => {
                    if (!this.resultsContainer.contains(document.activeElement)) {
                        this.hideResults();
                    }
                }, 200);
            }
            
            hideResults() {
                this.resultsContainer.classList.add('hidden');
                this.resultsContainer.style.display = 'none';
                this.resultsContainer.innerHTML = '';
                this.selectedIndex = -1;
            }
        }
        
        // ==================== CHANGEMENT D'ONGLET ====================
        document.querySelectorAll('[data-tab]').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabType = this.dataset.tab;
                
                document.querySelectorAll('[data-tab]').forEach(t => {
                    t.classList.remove('tab-active', 'bg-white', 'text-gray-800');
                    t.classList.add('tab-inactive', 'text-gray-500');
                });
                
                this.classList.remove('tab-inactive', 'text-gray-500');
                this.classList.add('tab-active', 'bg-white', 'text-gray-800');
                
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.add('hidden');
                });
                
                document.getElementById(`${tabType}-section`).classList.remove('hidden');
            });
        });
        
        // ==================== INITIALISATION DE L'AUTOCOMPLETION ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Initialiser sur tous les champs de ville
            const cityInputs = [
                'hotel-destination',
                'flight-origin', 
                'flight-destination'
            ];
            
            cityInputs.forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    new CityAutocomplete(input, {
                        minChars: 2,
                        delay: 300
                    });
                }
            });
            
            // Initialiser les dates par défaut
            const today = new Date();
            const defaultCheckin = new Date();
            defaultCheckin.setDate(today.getDate() + 60);
            const defaultCheckout = new Date();
            defaultCheckout.setDate(today.getDate() + 63);
            
            const hotelCheckin = document.getElementById('hotel-checkin');
            const hotelCheckout = document.getElementById('hotel-checkout');
            if (hotelCheckin) hotelCheckin.value = defaultCheckin.toISOString().split('T')[0];
            if (hotelCheckout) hotelCheckout.value = defaultCheckout.toISOString().split('T')[0];
            
            const flightDeparture = document.getElementById('flight-departure');
            const flightReturn = document.getElementById('flight-return');
            if (flightDeparture) flightDeparture.value = defaultCheckin.toISOString().split('T')[0];
            if (flightReturn) flightReturn.value = defaultCheckout.toISOString().split('T')[0];
        });
        
        // ==================== SÉLECTEUR DE PASSAGERS ====================
        let passengerCount = 1;
        const passengerCountSpan = document.getElementById('passenger-count');
        const passengerSelector = document.getElementById('passenger-selector');
        
        if(passengerSelector) {
            passengerSelector.addEventListener('click', () => {
                passengerCount = passengerCount === 5 ? 1 : passengerCount + 1;
                if(passengerCountSpan) passengerCountSpan.textContent = passengerCount;
            });
        }
        
        // ==================== RECHERCHE HÔTELS ====================
        const hotelSearchBtn = document.getElementById('hotel-search-btn');
        if(hotelSearchBtn) {
            hotelSearchBtn.addEventListener('click', function() {
                const destination = document.getElementById('hotel-destination')?.value;
                const checkin = document.getElementById('hotel-checkin')?.value;
                const checkout = document.getElementById('hotel-checkout')?.value;
                const adults = document.getElementById('hotel-adults')?.value;
                const childrenAges = document.getElementById('hotel-children-ages')?.value;
                
                if(!destination) {
                    alert('Veuillez saisir une destination');
                    return;
                }
                
                let url = `search.php?type=hotel&city=${encodeURIComponent(destination)}&check_in=${checkin}&check_out=${checkout}&adults=${adults}`;
                if (childrenAges) {
                    url += `&children_ages=${encodeURIComponent(childrenAges)}`;
                }
                
                window.location.href = url;
            });
        }
        
        // ==================== RECHERCHE VOLS ====================
        const flightSearchBtn = document.getElementById('flight-search-btn');
        if(flightSearchBtn) {
            flightSearchBtn.addEventListener('click', function() {
                const origin = document.getElementById('flight-origin')?.value;
                const destination = document.getElementById('flight-destination')?.value;
                const departure = document.getElementById('flight-departure')?.value;
                const returnDate = document.getElementById('flight-return')?.value;
                const passengers = passengerCount;
                
                if(!origin || !destination) {
                    alert('Veuillez saisir la ville de départ et d\'arrivée');
                    return;
                }
                
                let url = `search.php?type=flight&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}&departure=${departure}&return=${returnDate}&adults=${passengers}`;
                
                window.location.href = url;
            });
        }
    </script>
    
</body>
</html>
