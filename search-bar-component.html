<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche de voyage - Style Expedia/Airbnb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        /* Style personnalisé pour les inputs sans bordure */
        .search-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
        }
        
        .tab-active {
            background: white;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            position: relative;
            z-index: 10;
        }
        
        .tab-inactive {
            background: transparent;
            color: #6b7280;
        }
        
        .divider-vertical {
            border-right: 1px solid #e5e7eb;
        }
        
        /* Masquer les flèches des inputs number */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        /* Focus sans bordure */
        input:focus, select:focus {
            outline: none;
            ring: none;
        }
        
        /* Badge NEW */
        .badge-new {
            position: absolute;
            top: -8px;
            right: -20px;
            background: #ef4444;
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        
        @media (max-width: 768px) {
            .divider-vertical {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-500 to-purple-600 min-h-screen flex items-center justify-center p-4">
    
    <div class="w-full max-w-6xl mx-auto">
        
        <!-- Onglets (Tabs) -->
        <div class="flex gap-1 ml-6">
            <!-- Hotels -->
            <div class="tab-active px-8 py-3 rounded-t-xl font-semibold text-gray-800 cursor-pointer transition bg-white shadow-sm" data-tab="hotels">
                Hotels
            </div>
            
            <!-- Flights -->
            <div class="tab-inactive px-8 py-3 rounded-t-xl font-semibold text-gray-500 cursor-pointer transition hover:bg-white/30" data-tab="flights">
                Vols
            </div>
            
            <!-- Car Rental (avec badge NEW) -->
            <div class="tab-inactive px-8 py-3 rounded-t-xl font-semibold text-gray-500 cursor-pointer transition hover:bg-white/30 relative" data-tab="cars">
                Car Rental
                <span class="badge-new">NEW</span>
            </div>
        </div>
        
        <!-- Barre de recherche principale -->
        <div class="search-container bg-white rounded-2xl shadow-2xl overflow-hidden">
            
            <!-- Options de voyage (Round trip / One way / Multi-city) -->
            <div class="px-6 pt-5 pb-2 border-b border-gray-100">
                <div class="flex gap-6 text-sm">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="trip-type" value="roundtrip" checked class="w-4 h-4 text-blue-500">
                        <span class="text-gray-700">Round trip</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="trip-type" value="oneway" class="w-4 h-4 text-blue-500">
                        <span class="text-gray-700">One way</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="trip-type" value="multicity" class="w-4 h-4 text-blue-500">
                        <span class="text-gray-700">Multi-city</span>
                    </label>
                </div>
            </div>
            
            <!-- Champs de recherche horizontaux -->
            <div class="flex flex-col md:flex-row">
                
                <!-- 1. Départ / Arrivée -->
                <div class="flex-1 flex flex-col md:flex-row">
                    <!-- Départ -->
                    <div class="flex-1 relative p-4 md:pl-6 md:pr-4 divider-vertical">
                        <div class="flex items-center gap-3">
                            <div class="text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Flying from</label>
                                <input type="text" placeholder="Paris (CDG)" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0" value="Kinshasa (FIH)">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Arrivée -->
                    <div class="flex-1 relative p-4 md:pr-6 divider-vertical">
                        <div class="flex items-center gap-3">
                            <div class="text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"></path>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Flying to</label>
                                <input type="text" placeholder="New York (JFK)" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0" value="Lubumbashi (FBM)">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 2. Dates -->
                <div class="flex-1 flex flex-col md:flex-row">
                    <!-- Départ -->
                    <div class="flex-1 p-4 md:pr-4 divider-vertical">
                        <div class="flex items-center gap-3">
                            <div class="text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Departure</label>
                                <input type="date" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0" value="2026-05-15">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Retour -->
                    <div class="flex-1 p-4 divider-vertical">
                        <div class="flex items-center gap-3">
                            <div class="text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                            </div>
                            <div class="flex-1">
                                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Return</label>
                                <input type="date" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0" value="2026-05-20">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 3. Passagers / Classe -->
                <div class="w-full md:w-72 p-4">
                    <div class="flex items-center gap-3 h-full">
                        <div class="text-gray-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <div class="flex-1">
                            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Passengers</label>
                            <div class="flex items-center justify-between">
                                <span id="passenger-count" class="text-lg font-medium text-gray-800">1</span>
                                <span class="text-gray-400 mx-2">•</span>
                                <select class="text-sm text-gray-700 border-none bg-transparent focus:ring-0">
                                    <option>Economy</option>
                                    <option>Premium Economy</option>
                                    <option>Business</option>
                                    <option>First Class</option>
                                </select>
                                <button id="passenger-selector" class="ml-2 text-gray-400 hover:text-gray-600">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Bouton SEARCH -->
                <div class="md:w-auto p-3 bg-[#7c9aff] flex items-center justify-center md:rounded-r-2xl">
                    <button class="text-white font-bold text-lg uppercase tracking-wide px-8 py-3 w-full md:w-auto whitespace-nowrap">
                        SEARCH
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Message d'exemple -->
        <div class="text-center mt-8 text-white/80 text-sm">
            ✈️ 126 vols disponibles • Meilleurs prix garantis
        </div>
    </div>
    <!-- Barre de recherche HÔTELS (inspirée du style) -->
<div class="search-container bg-white rounded-2xl shadow-2xl overflow-hidden">
    
    <!-- Titre -->
    <div class="px-6 pt-5 pb-2 border-b border-gray-100">
        <h2 class="text-lg font-semibold text-gray-800">Rechercher un hôtel</h2>
    </div>
    
    <!-- Champs de recherche hôtels -->
    <div class="flex flex-col md:flex-row">
        
        <!-- Destination -->
        <div class="flex-1 p-4 md:pl-6 divider-vertical">
            <div class="flex items-center gap-3">
                <div class="text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                </div>
                <div class="flex-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Destination</label>
                    <input type="text" id="hotel-destination" placeholder="Ville, hôtel ou lieu" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0">
                </div>
            </div>
        </div>
        
        <!-- Check-in -->
        <div class="flex-1 p-4 divider-vertical">
            <div class="flex items-center gap-3">
                <div class="text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div class="flex-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Check-in</label>
                    <input type="date" id="hotel-checkin" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0">
                </div>
            </div>
        </div>
        
        <!-- Check-out -->
        <div class="flex-1 p-4 divider-vertical">
            <div class="flex items-center gap-3">
                <div class="text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div class="flex-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Check-out</label>
                    <input type="date" id="hotel-checkout" class="w-full text-lg font-medium text-gray-800 border-none p-0 focus:ring-0">
                </div>
            </div>
        </div>
        
        <!-- Adultes et enfants -->
        <div class="w-full md:w-64 p-4">
            <div class="flex items-center gap-3 h-full">
                <div class="text-gray-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </div>
                <div class="flex-1">
                    <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Voyageurs</label>
                    <div class="flex items-center gap-2">
                        <input type="number" id="hotel-adults" value="2" min="1" class="w-16 text-lg font-medium text-gray-800 border border-gray-200 rounded-lg p-1 text-center">
                        <span class="text-gray-400 text-sm">adultes</span>
                        <input type="text" id="hotel-children-ages" placeholder="Âges" class="w-20 text-sm text-gray-800 border border-gray-200 rounded-lg p-1 text-center">
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Bouton SEARCH -->
        <div class="md:w-auto p-3 bg-blue-600 flex items-center justify-center md:rounded-r-2xl">
            <button id="hotel-search-btn" class="text-white font-bold text-lg uppercase tracking-wide px-8 py-3 w-full md:w-auto whitespace-nowrap">
                RECHERCHER
            </button>
        </div>
    </div>
</div>
    <script>
        // Changement d'onglet
        document.querySelectorAll('[data-tab]').forEach(tab => {
            tab.addEventListener('click', function() {
                // Reset tous les onglets
                document.querySelectorAll('[data-tab]').forEach(t => {
                    t.classList.remove('tab-active', 'bg-white', 'text-gray-800');
                    t.classList.add('tab-inactive', 'text-gray-500');
                });
                
                // Activer l'onglet cliqué
                this.classList.remove('tab-inactive', 'text-gray-500');
                this.classList.add('tab-active', 'bg-white', 'text-gray-800');
                
                // Simulation de changement de contenu
                const tabType = this.dataset.tab;
                console.log(`Changement d'onglet vers: ${tabType}`);
            });
        });
        
        // Sélecteur de passagers simple
        let passengerCount = 1;
        const passengerCountSpan = document.getElementById('passenger-count');
        const passengerSelector = document.getElementById('passenger-selector');
        
        if(passengerSelector) {
            passengerSelector.addEventListener('click', () => {
                passengerCount = passengerCount === 5 ? 1 : passengerCount + 1;
                passengerCountSpan.textContent = passengerCount;
            });
        }
        
        // Format des dates pour l'affichage
        const dateInputs = document.querySelectorAll('input[type="date"]');
        dateInputs.forEach(input => {
            input.addEventListener('change', function() {
                const date = new Date(this.value);
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                console.log(`Date sélectionnée: ${date.toLocaleDateString('fr-FR', options)}`);
            });
        });
        // Initialiser les dates par défaut (60 jours dans le futur)
const today = new Date();
const defaultCheckin = new Date();
defaultCheckin.setDate(today.getDate() + 60);
const defaultCheckout = new Date();
defaultCheckout.setDate(today.getDate() + 63);

document.getElementById('hotel-checkin').value = defaultCheckin.toISOString().split('T')[0];
document.getElementById('hotel-checkout').value = defaultCheckout.toISOString().split('T')[0];

// Recherche d'hôtels
document.getElementById('hotel-search-btn').addEventListener('click', function() {
    const destination = document.getElementById('hotel-destination').value;
    const checkin = document.getElementById('hotel-checkin').value;
    const checkout = document.getElementById('hotel-checkout').value;
    const adults = document.getElementById('hotel-adults').value;
    const childrenAges = document.getElementById('hotel-children-ages').value;
    
    let url = `search.php?type=hotel&city=${encodeURIComponent(destination)}&check_in=${checkin}&check_out=${checkout}&adults=${adults}`;
    if (childrenAges) {
        url += `&children_ages=${encodeURIComponent(childrenAges)}`;
    }
    
    window.location.href = url;
});
    </script>
    
</body>
</html>
