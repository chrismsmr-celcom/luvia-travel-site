services:
  - type: web
    name: agence-voyage
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: agence-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: agence-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: agence-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: agence-db
          property: password

databases:
  - name: agence-db
    plan: free
